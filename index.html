    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
        }

        /* Animated gradient background */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                linear-gradient(90deg, rgba(0,255,0,0.03) 1px, transparent 1px),
                linear-gradient(rgba(0,255,0,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            z-index: 0;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        /* Scanning line effect */
        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, #00ff00, #00ffff, #00ff00, transparent);
            box-shadow: 0 0 20px #00ff00, 0 0 40px #00ff00;
            animation: scan 2s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes scan {
            0%, 100% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .redirect-container {
            padding: 2rem;
            position: relative;
            z-index: 2;
        }

        /* Clean glowing text - white/cyan theme */
        .matrix-text {
            color: #ffffff;
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 6px;
            margin-bottom: 1rem;
            position: relative;
            text-shadow:
                0 0 10px rgba(255,255,255,0.5),
                0 0 20px rgba(0,255,255,0.3),
                0 0 30px rgba(0,255,255,0.2);
            animation: textGlow 3s ease-in-out infinite alternate;
        }

        /* Subtle chromatic aberration - only slight color offset */
        .matrix-text::before,
        .matrix-text::after {
            content: '[ INITIALISING ]';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.3;
        }

        .matrix-text::before {
            color: #ff0066;
            transform: translate(-1px, 0);
        }

        .matrix-text::after {
            color: #00ffff;
            transform: translate(1px, 0);
        }

        @keyframes textGlow {
            from {
                text-shadow: 0 0 10px rgba(255,255,255,0.4), 0 0 20px rgba(0,255,255,0.2);
                filter: brightness(1);
            }
            to {
                text-shadow: 0 0 15px rgba(255,255,255,0.6), 0 0 30px rgba(0,255,255,0.3);
                filter: brightness(1.1);
            }
        }

        .subtitle {
            color: #00ff00;
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 2rem;
            letter-spacing: 2px;
            animation: fadeInOut 3s ease-in-out infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* Epic loading bar */
        .loading-bar {
            width: 350px;
            height: 6px;
            background: rgba(0, 17, 0, 0.8);
            border: 2px solid #00ff00;
            border-radius: 10px;
            margin: 2rem auto;
            position: relative;
            overflow: hidden;
            box-shadow:
                0 0 10px rgba(0,255,0,0.3),
                inset 0 0 10px rgba(0,255,0,0.1);
        }

        .loading-progress {
            height: 100%;
            background: linear-gradient(90deg,
                transparent,
                #00ff00 20%,
                #00ffff 50%,
                #00ff00 80%,
                transparent);
            animation: loading 1.5s ease-in-out infinite;
            position: absolute;
            width: 60%;
            border-radius: 10px;
            box-shadow: 0 0 20px #00ff00;
        }

        /* Particle dots on loading bar */
        .loading-bar::before,
        .loading-bar::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: #00ffff;
            border-radius: 50%;
            top: 50%;
            transform: translateY(-50%);
            box-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
        }

        .loading-bar::before {
            left: 0;
            animation: particleLeft 1.5s ease-in-out infinite;
        }

        .loading-bar::after {
            right: 0;
            animation: particleRight 1.5s ease-in-out infinite;
        }

        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }

        @keyframes particleLeft {
            0%, 100% { opacity: 1; transform: translateY(-50%) scale(1); }
            50% { opacity: 0.5; transform: translateY(-50%) scale(1.5); }
        }

        @keyframes particleRight {
            0%, 100% { opacity: 0.5; transform: translateY(-50%) scale(1.5); }
            50% { opacity: 1; transform: translateY(-50%) scale(1); }
        }

        .help-text {
            margin-top: 2rem;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        a {
            color: #00ffff;
            text-decoration: none;
            border-bottom: 1px solid #00ffff;
            transition: all 0.3s;
            padding-bottom: 2px;
        }

        a:hover {
            color: #00ff00;
            border-color: #00ff00;
            text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
        }

        /* Matrix rain effect - enhanced */
        .matrix-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.15;
            z-index: 0;
        }

        .matrix-rain::before {
            content: "01001000 01100101 01101100 01101100 01101111";
            position: absolute;
            color: #00ff00;
            font-size: 12px;
            animation: rain 8s linear infinite;
            white-space: pre;
            line-height: 2;
            left: 10%;
        }

        .matrix-rain::after {
            content: "10101010 11001100 01010101 10011001";
            position: absolute;
            color: #00ff00;
            font-size: 12px;
            animation: rain 6s linear infinite 1s;
            white-space: pre;
            line-height: 2;
            right: 10%;
        }

        @keyframes rain {
            0% { transform: translateY(-100%); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(100vh); opacity: 0; }
        }

        /* Corner decorations */
        .corner {
            position: fixed;
            width: 50px;
            height: 50px;
            border: 2px solid #00ff00;
            opacity: 0.5;
            z-index: 1;
        }

        .corner-tl { top: 20px; left: 20px; border-right: none; border-bottom: none; }
        .corner-tr { top: 20px; right: 20px; border-left: none; border-bottom: none; }
        .corner-bl { bottom: 20px; left: 20px; border-right: none; border-top: none; }
        .corner-br { bottom: 20px; right: 20px; border-left: none; border-top: none; }

        /* Mobile responsive styles */
        @media (max-width: 768px) {
            .matrix-text {
                font-size: 1.3rem;
                letter-spacing: 4px;
            }

            .matrix-text::before,
            .matrix-text::after {
                content: '[ INITIALISING ]';
            }

            .subtitle {
                font-size: 0.9rem;
                padding: 0 1rem;
            }

            .loading-bar {
                width: 280px;
            }

            .corner {
                width: 30px;
                height: 30px;
            }

            .corner-tl { top: 10px; left: 10px; }
            .corner-tr { top: 10px; right: 10px; }
            .corner-bl { bottom: 10px; left: 10px; }
            .corner-br { bottom: 10px; right: 10px; }
        }

        @media (max-width: 480px) {
            .matrix-text {
                font-size: 1rem;
                letter-spacing: 2px;
            }

            .subtitle {
                font-size: 0.8rem;
            }

            .loading-bar {
                width: 200px;
                height: 4px;
            }

            .help-text {
                font-size: 0.75rem;
                padding: 0 1rem;
            }

            .corner {
                width: 20px;
                height: 20px;
            }
        }
    </style>
    
    <script>
        // JavaScript redirect to React app
        window.onload = function() {
            // Redirect to React app homepage
            window.location.replace('/react.html');
        };
        
        // Fallback redirect after 3 seconds
        setTimeout(function() {
            if (window.location.pathname === '/' ||
                window.location.pathname === '/index.html') {
                window.location.replace('/react.html');
            }
        }, 3000);
    </script>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="scan-line"></div>
    <div class="matrix-rain"></div>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <div class="redirect-container">
        <h1 class="matrix-text">[ INITIALISING ]</h1>
        <p class="subtitle">Redirecting to Thomas J Butler Portfolio...</p>
        <div class="loading-bar">
            <div class="loading-progress"></div>
        </div>
        <p class="help-text">If you are not redirected automatically, <a href="/react.html">click here</a>.</p>
    </div>
</body>
</html>
